<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    body { margin: 0; }

    html.dark .bg-white     { background-color: #292524; }
    html.dark .bg-stone-100 { background-color: #3c3837; }
    html.dark .bg-stone-200 { background-color: #44403c; }
    html.dark .bg-stone-900 { background-color: #fafaf9; }
    html.dark .bg-amber-50  { background-color: #2d1f0f; }

    html.dark .text-stone-900 { color: #fafaf9; }
    html.dark .text-stone-800 { color: #e7e5e4; }
    html.dark .text-stone-700 { color: #d6d3d1; }
    html.dark .text-stone-600 { color: #a8a29e; }
    html.dark .text-stone-500 { color: #a8a29e; }
    html.dark .text-stone-400 { color: #78716c; }
    html.dark .text-stone-300 { color: #78716c; }
    html.dark .text-stone-50  { color: #1c1917; }
    html.dark .text-amber-700 { color: #d97706; }
    html.dark .text-amber-900 { color: #fbbf24; }

    html.dark .border-amber-200 { border-color: #78350f; }

    html.dark .hover\:bg-stone-100:hover    { background-color: #292524; }
    html.dark .hover\:bg-stone-200:hover    { background-color: #3c3837; }
    html.dark .hover\:bg-stone-800:hover    { background-color: #e7e5e4; }
    html.dark .hover\:bg-amber-50:hover     { background-color: #2d1f0f; }
    html.dark .hover\:border-amber-700:hover { border-color: #d97706; }
    html.dark .hover\:text-stone-700:hover  { color: #d6d3d1; }
    html.dark .hover\:text-stone-900:hover  { color: #fafaf9; }
    html.dark .focus\:border-amber-700:focus { border-color: #d97706; }

</head>
<body>
  <div id="root"></div>

  <script>if (localStorage.getItem('five_theme') === 'dark') document.documentElement.classList.add('dark');</script>

  <script type="text/babel" data-presets="react">
    // ============================================================
    // CONFIGURE ME — paste your Supabase values here
    // ============================================================
    const SUPABASE_URL  = "https://jntnpavxsqfddtczvxkp.supabase.co";   // e.g. "https://xyzabc.supabase.co"
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudG5wYXZ4c3FmZGR0Y3p2eGtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDU0ODUsImV4cCI6MjA5MjUyMTQ4NX0.pTLV_jacLiwKdYjqYCr4dA358eS6dN7pZVRoSF1rjJo";  // the "anon public" key
    // ============================================================

    const { useState, useEffect, useRef, useMemo } = React;
    const DURATION = 5 * 60;
    const CACHE_KEY = "five_entries_cache";
    const QUEUE_KEY = "five_pending_ops";

    const configured = SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON !== "YOUR_SUPABASE_ANON";
    const supa = configured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

    // ---------- tags ----------
    const parseTags = (raw) => {
      if (!raw) return [];
      const out = (raw || "").split(",").map((s) => s.trim().toLowerCase()).filter(Boolean);
      return [...new Set(out)];
    };
    const tagsToNote = (tags) => tags.join(", ");

    // ---------- local cache ----------
    const loadCache = () => { try { return JSON.parse(localStorage.getItem(CACHE_KEY) || "[]"); } catch (e) { return []; } };
    const saveCache = (entries) => { try { localStorage.setItem(CACHE_KEY, JSON.stringify(entries)); } catch (e) {} };
    const loadQueue = () => { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); } catch (e) { return []; } };
    const saveQueue = (q) => { try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch (e) {} };

    // ============================================================
    function SetupNeeded() {
      const serif = "ui-serif, Georgia, serif";
      return (
        <div className="min-h-screen bg-stone-50 text-stone-900 flex items-center justify-center p-6" style={{ fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
          <div className="max-w-md">
            <h1 className="text-4xl italic tracking-tight mb-6" style={{ fontFamily: serif }}>Five.</h1>
            <div className="text-sm text-stone-700 leading-relaxed">
              <p><strong>Setup required.</strong> Open <code className="bg-stone-200 px-1">index.html</code> and paste your Supabase URL and anon public key near the top. See the README for the full walk-through.</p>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    function AuthGate() {
      const [mode, setMode] = useState("signin");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState(null);
      const serif = "ui-serif, Georgia, serif";

      const submit = async () => {
        if (!email.trim() || !password) return;
        if (mode === "signup" && password.length < 6) { setError("password must be at least 6 characters"); return; }
        setSubmitting(true); setError(null);
        try {
          if (mode === "signin") {
            const { error } = await supa.auth.signInWithPassword({ email: email.trim(), password });
            if (error) throw error;
          } else {
            const { error } = await supa.auth.signUp({ email: email.trim(), password });
            if (error) throw error;
          }
        } catch (e) {
          setError((e.message || "something went wrong").toLowerCase());
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900 flex items-center justify-center px-5" style={{ fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
          <style>{`
            input { font-size: 16px !important; }
            button, input { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
          `}</style>
          <div className="w-full max-w-sm">
            <h1 className="text-5xl italic tracking-tight mb-2" style={{ fontFamily: serif }}>Five.</h1>
            <div className="text-xs text-stone-400 tracking-widest uppercase mb-10">a logbook</div>
            <div className="text-sm text-stone-600 mb-5 leading-relaxed">
              {mode === "signin" ? "Sign in to your logbook." : "Create your logbook."}
            </div>
            <input
              type="email" inputMode="email" autoComplete="email" autoCapitalize="none" autoCorrect="off"
              value={email} onChange={(e) => setEmail(e.target.value)} placeholder="email"
              className="w-full border border-stone-300 bg-white px-3 py-3 mb-3 focus:outline-none focus:border-amber-700"
              style={{ borderRadius: "2px" }}
            />
            <input
              type="password" autoComplete={mode === "signin" ? "current-password" : "new-password"}
              value={password} onChange={(e) => setPassword(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
              placeholder="password"
              className="w-full border border-stone-300 bg-white px-3 py-3 mb-4 focus:outline-none focus:border-amber-700"
              style={{ borderRadius: "2px" }}
            />
            <button
              onClick={submit} disabled={submitting || !email.trim() || !password}
              className="w-full bg-stone-900 text-stone-50 py-3 text-sm tracking-wide hover:bg-stone-800 active:scale-95 transition-all disabled:opacity-40"
              style={{ borderRadius: "2px" }}
            >
              {submitting ? "…" : (mode === "signin" ? "Sign in" : "Create account")}
            </button>
            {error && <div className="mt-3 text-sm text-red-700">{error}</div>}
            <div className="mt-8 text-center">
              <button onClick={() => { setMode(mode === "signin" ? "signup" : "signin"); setError(null); }}
                className="text-xs text-stone-500 hover:text-stone-900 tracking-wide">
                {mode === "signin" ? "first time? create an account" : "already have an account? sign in"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // PRINCIPLES — a seed that will grow
    // ============================================================
    function Principles({ onBack }) {
      const serif = "ui-serif, Georgia, Cambria, 'Times New Roman', serif";
      const principles = [
        {
          title: "Five minutes.",
          body: "Small enough to start. Big enough to count. The mechanism is not time management — it is lowering the activation energy past the point where the mind can bargain with itself. Once motion begins, continuing is usually easier than stopping, so one block becomes two, and two become four, and at the end of the hour there is something to show for it."
        },
        {
          title: "One thing, with its companions.",
          body: "Do one thing at a time. But one thing is rarely only one thing — a task contains its own small subtasks, thoughts, and adjustments. Let them live under the same block. Five minutes of reading might also have been thinking, and note-taking, and a moment of staring at the wall. Record all of them together. The single-focus rule is about attention, not about bookkeeping."
        },
        {
          title: "Friction is the enemy.",
          body: "Log first. Tag later. The app should never interrupt the work to ask for metadata. If naming what you did would slow you down, skip the naming — the ledger accepts untitled entries, and you can tag them later by tapping them."
        },
        {
          title: "A ledger, not a leaderboard.",
          body: "There are no streaks, no goals, no targets, no badges. The app does not praise consistency and does not punish gaps. It counts. Counting alone, done honestly, is usually enough — and anything more starts to bend the practice toward performance instead of work."
        },
        {
          title: "Answer the quiet voice.",
          body: "The voice that asks but what have I actually been doing. That voice is corrosive, and unanswered it eats through the practice. The ledger exists to answer it with evidence. A number you can see. A total you can believe. A record that cannot be argued with, because it was written by you, one five at a time."
        },
        {
          title: "Every tag earns its full minutes.",
          body: "When a five-minute block carries more than one tag, each tag is credited the full five minutes. A block tagged reading and thinking counts as five minutes of reading and five minutes of thinking. The activities genuinely happened together; neither one is half-real because the other was also present. The per-tag sums may exceed the clock — that is not an error, it is the acknowledgment that attention can hold more than one thing at once."
        }
      ];

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
          <div className="max-w-md mx-auto px-5 py-6">
            <div className="flex items-baseline justify-between mb-10">
              <h1 className="text-3xl italic tracking-tight" style={{ fontFamily: serif }}>Five.</h1>
              <button onClick={onBack} className="text-xs text-stone-500 hover:text-stone-900 tracking-widest uppercase">
                ← back to log
              </button>
            </div>

            <div className="mb-8 pb-4 border-b border-stone-300">
              <div className="text-xs text-stone-500 uppercase tracking-widest mb-1">principles</div>
              <div className="text-sm text-stone-400 italic" style={{ fontFamily: serif }}>
                the ideas behind the app — a beginning, not a conclusion.
              </div>
            </div>

            <div className="space-y-8">
              {principles.map((p, i) => (
                <div key={i}>
                  <div className="flex items-baseline gap-3 mb-2">
                    <div className="text-xs text-stone-400 tabular-nums" style={{ fontFamily: serif }}>
                      {String(i + 1).padStart(2, "0")}
                    </div>
                    <h2 className="text-xl italic text-stone-900" style={{ fontFamily: serif }}>
                      {p.title}
                    </h2>
                  </div>
                  <p className="text-sm text-stone-700 leading-relaxed ml-7">
                    {p.body}
                  </p>
                </div>
              ))}
            </div>

            <div className="mt-12 pt-6 border-t border-stone-200 text-center">
              <div className="text-xs text-stone-400 italic" style={{ fontFamily: serif }}>
                more to come. this section will grow with use.
              </div>
            </div>

            <div className="text-center mt-10 text-xs text-stone-300 italic" style={{ fontFamily: serif }}>
              do one small thing. then another.
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function FiveMinuteLog({ session, onSignOut, darkMode, toggleTheme }) {
      const [view, setView] = useState("log");
      const [entries, setEntries] = useState(() => loadCache());
      const [loading, setLoading] = useState(true);
      const [syncState, setSyncState] = useState("idle");
      const [timeLeft, setTimeLeft] = useState(DURATION);
      const [running, setRunning] = useState(false);
      const [justLogged, setJustLogged] = useState(false);
      const [selectedTags, setSelectedTags] = useState([]);
      const [tagInput, setTagInput] = useState("");
      const [showTimer, setShowTimer] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState("");
      const [confirmClear, setConfirmClear] = useState(false);
      const intervalRef = useRef(null);
      const entriesRef = useRef(entries);
      const wakeLockRef = useRef(null);
      const userId = session.user.id;

      useEffect(() => { entriesRef.current = entries; saveCache(entries); }, [entries]);

      // ------- sync -------
      const pullFromServer = async () => {
        setSyncState("syncing");
        try {
          const { data, error } = await supa.from("entries").select("*").eq("user_id", userId).order("timestamp", { ascending: false });
          if (error) throw error;
          setEntries(data.map((r) => ({ id: Number(r.id), timestamp: Number(r.timestamp), note: r.note || "" })));
          setSyncState("idle");
        } catch (e) {
          setSyncState(navigator.onLine ? "error" : "offline");
        }
      };

      const enqueue = (op) => { const q = loadQueue(); q.push(op); saveQueue(q); };
      const flushQueue = async () => {
        if (!navigator.onLine) { setSyncState("offline"); return; }
        let q = loadQueue();
        if (q.length === 0) return;
        setSyncState("syncing");
        try {
          for (const op of q) {
            if (op.type === "insert") {
              await supa.from("entries").insert({ id: op.id, user_id: userId, timestamp: op.timestamp, note: op.note || "" });
            } else if (op.type === "update") {
              await supa.from("entries").update({ note: op.note || "" }).eq("id", op.id).eq("user_id", userId);
            } else if (op.type === "delete") {
              await supa.from("entries").delete().eq("id", op.id).eq("user_id", userId);
            } else if (op.type === "clear") {
              await supa.from("entries").delete().eq("user_id", userId);
            }
          }
          saveQueue([]);
          setSyncState("idle");
        } catch (e) { setSyncState("error"); }
      };

      useEffect(() => { (async () => { await flushQueue(); await pullFromServer(); setLoading(false); })(); }, []);
      useEffect(() => {
        const ch = supa.channel("entries-" + userId)
          .on("postgres_changes", { event: "*", schema: "public", table: "entries", filter: `user_id=eq.${userId}` }, () => pullFromServer())
          .subscribe();
        return () => { supa.removeChannel(ch); };
      }, [userId]);
      useEffect(() => {
        const onOnline = () => flushQueue().then(() => pullFromServer());
        const onOffline = () => setSyncState("offline");
        window.addEventListener("online", onOnline);
        window.addEventListener("offline", onOffline);
        if (!navigator.onLine) setSyncState("offline");
        return () => { window.removeEventListener("online", onOnline); window.removeEventListener("offline", onOffline); };
      }, []);

      // ------- wake lock -------
      const acquireWakeLock = async () => { try { if ("wakeLock" in navigator) wakeLockRef.current = await navigator.wakeLock.request("screen"); } catch (e) {} };
      const releaseWakeLock = async () => { try { if (wakeLockRef.current) { await wakeLockRef.current.release(); wakeLockRef.current = null; } } catch (e) {} };
      useEffect(() => {
        const handler = () => { if (document.visibilityState === "visible" && running) acquireWakeLock(); };
        document.addEventListener("visibilitychange", handler);
        return () => document.removeEventListener("visibilitychange", handler);
      }, [running]);

      // ------- compose -------
      const toggleTag = (tag) => {
        const norm = parseTags(tag)[0];
        if (!norm) return;
        setSelectedTags((prev) => prev.includes(norm) ? prev.filter((t) => t !== norm) : [...prev, norm]);
      };
      const addFromInput = () => {
        const tags = parseTags(tagInput);
        if (tags.length === 0) return;
        setSelectedTags((prev) => {
          const merged = [...prev];
          for (const t of tags) if (!merged.includes(t)) merged.push(t);
          return merged;
        });
        setTagInput("");
      };
      const clearCompose = () => { setSelectedTags([]); setTagInput(""); };

      // Merge staged tags + any pending input text into a final tag list
      const composeFinalTags = () => {
        const pending = parseTags(tagInput);
        const out = [...selectedTags];
        for (const t of pending) if (!out.includes(t)) out.push(t);
        return out;
      };

      const logComposed = async () => {
        const finalTags = composeFinalTags();
        const note = tagsToNote(finalTags);
        const entry = { id: Date.now(), timestamp: Date.now(), note };
        setEntries((prev) => [entry, ...prev]);
        enqueue({ type: "insert", id: entry.id, timestamp: entry.timestamp, note });
        // Merge any pending input text into the staged tags so the next log reuses them.
        // Do NOT clear the selection — persistence lets the user log the same tags repeatedly.
        setSelectedTags(finalTags);
        setTagInput("");
        try { if (navigator.vibrate) navigator.vibrate(30); } catch (e) {}
        flushQueue();
      };

      const autoLog = async () => {
        const finalTags = composeFinalTags();
        const note = tagsToNote(finalTags);
        const entry = { id: Date.now(), timestamp: Date.now(), note };
        setEntries((prev) => [entry, ...prev]);
        enqueue({ type: "insert", id: entry.id, timestamp: entry.timestamp, note });
        setSelectedTags(finalTags);
        setTagInput("");
        setJustLogged(true);
        releaseWakeLock();
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) {
            const ctx = new AC(); const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = "sine"; o.frequency.value = 660;
            g.gain.setValueAtTime(0.0001, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
            o.start(); o.stop(ctx.currentTime + 0.65);
          }
        } catch (e) {}
        try { if (navigator.vibrate) navigator.vibrate([120, 80, 120]); } catch (e) {}
        flushQueue();
      };

      useEffect(() => {
        if (running && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft((prev) => { if (prev <= 1) { setRunning(false); autoLog(); return 0; } return prev - 1; });
          }, 1000);
          return () => clearInterval(intervalRef.current);
        }
      }, [running]);

      const startTimer = () => { setJustLogged(false); setTimeLeft(DURATION); setRunning(true); acquireWakeLock(); };
      const pauseTimer = () => { setRunning(false); releaseWakeLock(); };
      const resetTimer = () => { setRunning(false); setTimeLeft(DURATION); setJustLogged(false); releaseWakeLock(); };

      // ------- ledger edits -------
      const beginEdit = (entry) => { setEditingId(entry.id); setEditDraft(entry.note || ""); };
      const commitEdit = async () => {
        if (editingId == null) return;
        const note = tagsToNote(parseTags(editDraft));
        setEntries((prev) => prev.map((e) => e.id === editingId ? { ...e, note } : e));
        enqueue({ type: "update", id: editingId, note });
        setEditingId(null); setEditDraft("");
        flushQueue();
      };
      const cancelEdit = () => { setEditingId(null); setEditDraft(""); };

      const deleteEntry = async (id) => {
        setEntries((prev) => prev.filter((e) => e.id !== id));
        enqueue({ type: "delete", id });
        if (editingId === id) cancelEdit();
        flushQueue();
      };

      const clearAll = async () => {
        setEntries([]); enqueue({ type: "clear" }); setConfirmClear(false); flushQueue();
      };

      // ------- aggregations (multi-tag aware) -------
      const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
      const weekStart = new Date(); weekStart.setHours(0, 0, 0, 0); weekStart.setDate(weekStart.getDate() - 6);

      const groupByTag = (items) => {
        const groups = new Map();
        for (const e of items) {
          const tags = parseTags(e.note);
          if (tags.length === 0) {
            const key = "__untitled";
            if (!groups.has(key)) groups.set(key, { key, label: null, count: 0 });
            groups.get(key).count++;
          } else {
            for (const t of tags) {
              if (!groups.has(t)) groups.set(t, { key: t, label: t, count: 0 });
              groups.get(t).count++;
            }
          }
        }
        return [...groups.values()].sort((a, b) => b.count - a.count);
      };

      const todayEntries = entries.filter((e) => e.timestamp >= todayStart.getTime());
      const weekEntries  = entries.filter((e) => e.timestamp >= weekStart.getTime());
      const todayGroups = useMemo(() => groupByTag(todayEntries), [entries]);
      const weekGroups  = useMemo(() => groupByTag(weekEntries), [entries]);

      const topTags = useMemo(() => {
        const counts = new Map();
        for (const e of entries) for (const t of parseTags(e.note)) counts.set(t, (counts.get(t) || 0) + 1);
        return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12).map(([tag, count]) => ({ tag, count }));
      }, [entries]);

      const todayCount = todayEntries.length;
      const totalCount = entries.length;
      const totalMinutes = totalCount * 5;
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;

      const last7 = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0, 0, 0, 0);
        const next = d.getTime() + 24 * 60 * 60 * 1000;
        const count = entries.filter((e) => e.timestamp >= d.getTime() && e.timestamp < next).length;
        last7.push({ date: new Date(d), count });
      }
      const maxCount = Math.max(1, ...last7.map((d) => d.count));

      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      const progress = ((DURATION - timeLeft) / DURATION) * 100;

      const formatTimeAgo = (ts) => {
        const diff = Date.now() - ts;
        const mm = Math.floor(diff / 60000);
        if (mm < 1) return "just now";
        if (mm < 60) return `${mm}m ago`;
        const hh = Math.floor(mm / 60);
        if (hh < 24) return `${hh}h ago`;
        const dd = Math.floor(hh / 24);
        if (dd < 7) return `${dd}d ago`;
        const date = new Date(ts);
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      };

      const entryNumber = (index) => `#${String(totalCount - index).padStart(4, "0")}`;
      const serif = "ui-serif, Georgia, Cambria, 'Times New Roman', serif";

      const effectiveTags = composeFinalTags();
      const logLabel = (() => {
        if (effectiveTags.length === 0) return "+ Log a five";
        if (effectiveTags.length === 1) return `+ Log a five: ${effectiveTags[0]}`;
        if (effectiveTags.length === 2) return `+ Log a five: ${effectiveTags[0]}, ${effectiveTags[1]}`;
        return `+ Log a five · ${effectiveTags.length} tags`;
      })();

      const Breakdown = ({ title, groups, total }) => {
        const max = Math.max(1, ...groups.map((g) => g.count));
        return (
          <div className="mb-10">
            <div className="flex items-baseline justify-between mb-3 pb-2 border-b border-stone-300">
              <div className="text-xs text-stone-500 uppercase tracking-widest">{title}</div>
              {total > 0 && <div className="text-xs text-stone-400 tabular-nums">{total} · {total * 5}m</div>}
            </div>
            {groups.length === 0 ? (
              <div className="text-sm text-stone-400 italic py-4 text-center" style={{ fontFamily: serif }}>nothing {title.toLowerCase()}.</div>
            ) : (
              <div className="space-y-2">
                {groups.map((g) => {
                  const pct = (g.count / max) * 100;
                  return (
                    <div key={g.key} className="flex items-center gap-3">
                      <div className={`text-sm flex-shrink-0 ${g.label ? "text-stone-900" : "text-stone-400 italic"}`}
                           style={{ width: "92px", fontFamily: g.label ? "inherit" : serif, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {g.label || "untitled"}
                      </div>
                      <div className="flex-1 h-2 bg-stone-100 relative overflow-hidden" style={{ borderRadius: "1px" }}>
                        <div className="absolute left-0 top-0 h-full bg-amber-700" style={{ width: `${pct}%` }} />
                      </div>
                      <div className="text-xs text-stone-500 tabular-nums flex-shrink-0 text-right" style={{ fontFamily: serif, width: "60px" }}>
                        {g.count} · {g.count * 5}m
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      const syncBadge = {
        idle: { dot: "bg-green-600", text: "synced" },
        syncing: { dot: "bg-amber-500 animate-pulse", text: "syncing…" },
        offline: { dot: "bg-stone-400", text: "offline" },
        error: { dot: "bg-red-600", text: "sync error" },
      }[syncState];

      if (loading) {
        return (
          <div className="min-h-screen bg-stone-50 flex items-center justify-center">
            <div className="text-stone-400 text-sm italic" style={{ fontFamily: serif }}>opening the ledger…</div>
          </div>
        );
      }

      if (view === "principles") return <Principles onBack={() => setView("log")} />;

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif" }}>
          <style>{`
            input, textarea, select { font-size: 16px !important; }
            button, input, textarea, [role="button"] { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
          `}</style>
          <div className="max-w-md mx-auto px-5 py-6">

            <div className="flex items-baseline justify-between mb-2">
              <h1 className="text-3xl italic tracking-tight" style={{ fontFamily: serif }}>Five.</h1>
              <button onClick={() => setView("principles")} className="text-xs text-stone-400 hover:text-stone-900 tracking-widest uppercase">
                principles · a logbook
              </button>
            </div>
            <div className="flex items-center justify-between mb-6 text-xs text-stone-400">
              <div className="flex items-center gap-1.5">
                <span className={`inline-block w-1.5 h-1.5 rounded-full ${syncBadge.dot}`}></span>
                <span>{syncBadge.text}</span>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={toggleTheme} className="text-stone-400 hover:text-stone-700 tracking-wide">
                  {darkMode ? "light" : "dark"}
                </button>
                <button onClick={onSignOut} className="text-stone-400 hover:text-stone-700 tracking-wide">sign out</button>
              </div>
            </div>

            {/* PRIMARY LOG BUTTON */}
            <div className="mb-4">
              <button
                onClick={logComposed}
                className="w-full bg-stone-900 text-stone-50 py-5 text-base tracking-wide hover:bg-stone-800 active:scale-95 transition-all"
                style={{ borderRadius: "2px" }}
              >
                {logLabel}
              </button>
            </div>

            {/* SELECTED TAGS */}
            {selectedTags.length > 0 && (
              <div className="mb-3">
                <div className="flex items-center gap-2 mb-2">
                  <div className="text-xs text-stone-500 tracking-wide">staged (tap to remove):</div>
                  <button onClick={clearCompose} className="text-xs text-stone-400 hover:text-stone-900 tracking-wide underline-offset-2 hover:underline">clear all</button>
                </div>
                <div className="flex flex-wrap gap-2">
                  {selectedTags.map((t) => (
                    <button
                      key={t}
                      onClick={() => toggleTag(t)}
                      className="px-3 py-1.5 text-sm bg-stone-900 text-stone-50 active:scale-95 transition-all flex items-center gap-1.5"
                      style={{ borderRadius: "999px" }}
                    >
                      {t} <span className="opacity-60">×</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* QUICK CHIPS (toggleable) */}
            {topTags.length > 0 && (
              <div className="mb-4">
                <div className="text-xs text-stone-500 mb-2 tracking-wide">tap to select:</div>
                <div className="flex flex-wrap gap-2">
                  {topTags.map(({ tag, count }) => {
                    const isSelected = selectedTags.includes(tag);
                    return (
                      <button
                        key={tag}
                        onClick={() => toggleTag(tag)}
                        className={`px-3 py-1.5 text-sm border transition-all active:scale-95 ${
                          isSelected
                            ? "bg-stone-900 text-stone-50 border-stone-900"
                            : "bg-white text-stone-900 border-stone-300 hover:bg-amber-50 hover:border-amber-700"
                        }`}
                        style={{ borderRadius: "999px" }}
                      >
                        {tag} <span className={`text-xs tabular-nums ml-1 ${isSelected ? "opacity-60" : "text-stone-400"}`} style={{ fontFamily: serif }}>· {count}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* NEW TAG INPUT */}
            <div className="mb-5 flex gap-2">
              <input
                type="text"
                value={tagInput}
                onChange={(e) => setTagInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addFromInput(); } }}
                placeholder="new activity (commas for many)…"
                className="flex-1 border border-stone-300 bg-white px-3 py-2 text-sm focus:outline-none focus:border-amber-700"
                style={{ borderRadius: "2px" }}
              />
              <button
                onClick={addFromInput}
                disabled={!tagInput.trim()}
                className="px-4 py-2 text-sm bg-stone-100 border border-stone-300 text-stone-700 hover:bg-stone-200 disabled:opacity-40 tracking-wide"
                style={{ borderRadius: "2px" }}
              >
                add
              </button>
            </div>

            {/* TIMER TOGGLE */}
            <div className="mb-6 text-center">
              <button onClick={() => setShowTimer(!showTimer)} className="text-xs text-stone-500 hover:text-stone-900 tracking-wide">
                {showTimer ? "▴ hide in-app timer" : "▾ use the in-app timer"}
              </button>
            </div>

            {showTimer && (
              <div className={`mb-8 border p-6 text-center transition-colors ${justLogged ? "bg-amber-50 border-amber-200" : "bg-white border-stone-300"}`} style={{ borderRadius: "2px" }}>
                {justLogged ? (
                  <>
                    <div className="text-2xl italic text-amber-900 mb-1" style={{ fontFamily: serif }}>five. logged.</div>
                    <div className="text-xs text-stone-500 mb-5">#{String(totalCount).padStart(4, "0")}</div>
                    <button onClick={startTimer} className="w-full bg-stone-900 text-stone-50 py-3 text-sm tracking-wide hover:bg-stone-800 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                      Begin another five →
                    </button>
                    <button onClick={() => setJustLogged(false)} className="mt-3 text-xs text-stone-500 hover:text-stone-900">done for now</button>
                  </>
                ) : (
                  <>
                    <div className="tabular-nums tracking-tight text-stone-900 mb-4" style={{ fontFamily: serif, fontSize: "56px", lineHeight: 1 }}>
                      {m}:{String(s).padStart(2, "0")}
                    </div>
                    <div className="h-px bg-stone-200 mb-5 relative overflow-hidden">
                      <div className="absolute left-0 top-0 h-full bg-amber-700 transition-all duration-1000 ease-linear" style={{ width: `${progress}%` }} />
                    </div>
                    {!running ? (
                      <>
                        <button onClick={startTimer} className="w-full bg-stone-900 text-stone-50 py-3 text-sm tracking-wide hover:bg-stone-800 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                          {timeLeft === DURATION ? "Begin five" : "Resume"}
                        </button>
                        {timeLeft !== DURATION && <button onClick={resetTimer} className="mt-2 text-xs text-stone-500 hover:text-stone-900">reset</button>}
                      </>
                    ) : (
                      <button onClick={pauseTimer} className="w-full border border-stone-300 text-stone-900 py-3 text-sm tracking-wide hover:bg-stone-100 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                        Pause
                      </button>
                    )}
                    <div className="mt-3 text-xs text-stone-400 italic" style={{ fontFamily: serif }}>keeps the screen on while it runs</div>
                  </>
                )}
              </div>
            )}

            <Breakdown title="Today" groups={todayGroups} total={todayCount} />

            <div className="grid grid-cols-3 mb-8">
              <div className="pr-3">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>{todayCount}</div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">today</div>
              </div>
              <div className="px-3 border-l border-stone-200">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>{totalCount}</div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">total</div>
              </div>
              <div className="pl-3 border-l border-stone-200">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>
                  {hours}<span className="text-base text-stone-400">h</span> {mins}<span className="text-base text-stone-400">m</span>
                </div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">logged</div>
              </div>
            </div>

            <div className="mb-10">
              <div className="flex items-end justify-between gap-2" style={{ height: "64px" }}>
                {last7.map((d, i) => {
                  const h = d.count > 0 ? Math.max(3, (d.count / maxCount) * 48) : 2;
                  const isToday = i === 6;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1.5" style={{ height: "64px" }}>
                      <div className="text-xs text-stone-500 tabular-nums" style={{ fontFamily: serif, minHeight: "14px" }}>
                        {d.count > 0 ? d.count : ""}
                      </div>
                      <div className={`w-full rounded-sm ${isToday ? "bg-amber-700" : "bg-stone-300"}`} style={{ height: `${h}px` }} />
                    </div>
                  );
                })}
              </div>
              <div className="flex justify-between gap-2 mt-2">
                {last7.map((d, i) => {
                  const isToday = i === 6;
                  return (
                    <div key={i} className={`flex-1 text-center text-xs tracking-wide ${isToday ? "text-amber-700 font-medium" : "text-stone-400"}`}>
                      {["S", "M", "T", "W", "T", "F", "S"][d.date.getDay()]}
                    </div>
                  );
                })}
              </div>
            </div>

            <Breakdown title="This week" groups={weekGroups} total={weekEntries.length} />

            <div className="mb-8">
              <div className="flex items-baseline justify-between mb-3 pb-2 border-b border-stone-300">
                <div className="text-xs text-stone-500 uppercase tracking-widest">the ledger</div>
                {entries.length > 0 && (
                  <div className="text-xs text-stone-400 tabular-nums">
                    {entries.length} {entries.length === 1 ? "entry" : "entries"}
                  </div>
                )}
              </div>

              {entries.length === 0 ? (
                <div className="text-sm text-stone-400 italic py-10 text-center" style={{ fontFamily: serif }}>nothing yet. begin your first five.</div>
              ) : (
                <div>
                  {entries.slice(0, 50).map((entry, i) => {
                    const isEditing = editingId === entry.id;
                    const tags = parseTags(entry.note);
                    return (
                      <div
                        key={entry.id}
                        className={`flex items-start gap-3 py-3 border-b border-stone-200 ${!isEditing ? "cursor-pointer hover:bg-stone-100" : ""} transition-colors`}
                        onClick={() => !isEditing && beginEdit(entry)}
                      >
                        <div className="text-xs text-stone-400 tabular-nums pt-1 flex-shrink-0" style={{ fontFamily: serif, width: "44px" }}>
                          {entryNumber(i)}
                        </div>
                        <div className="flex-1 min-w-0">
                          {isEditing ? (
                            <input
                              type="text" value={editDraft}
                              onChange={(e) => setEditDraft(e.target.value)}
                              onBlur={commitEdit}
                              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commitEdit(); } if (e.key === "Escape") cancelEdit(); }}
                              placeholder="tags, comma-separated"
                              autoFocus
                              className="w-full bg-transparent border-b border-amber-700 text-sm text-stone-900 focus:outline-none pb-0.5"
                            />
                          ) : (
                            <div className="text-sm text-stone-900 break-words leading-snug">
                              {tags.length > 0 ? (
                                <span className="flex flex-wrap gap-1.5">
                                  {tags.map((t) => (
                                    <span key={t} className="inline-block bg-stone-100 text-stone-800 px-2 py-0.5 text-xs" style={{ borderRadius: "999px" }}>
                                      {t}
                                    </span>
                                  ))}
                                </span>
                              ) : (
                                <span className="text-stone-400 italic" style={{ fontFamily: serif }}>— untitled · tap to tag</span>
                              )}
                            </div>
                          )}
                          <div className="text-xs text-stone-400 mt-1 tabular-nums">{formatTimeAgo(entry.timestamp)}</div>
                        </div>
                        <button
                          onClick={(e) => { e.stopPropagation(); deleteEntry(entry.id); }}
                          className="text-stone-300 hover:text-stone-700 text-lg leading-none pt-1 flex-shrink-0"
                          aria-label="delete entry"
                        >×</button>
                      </div>
                    );
                  })}
                  {entries.length > 50 && (
                    <div className="text-xs text-stone-400 text-center py-4 italic" style={{ fontFamily: serif }}>
                      + {entries.length - 50} earlier entries
                    </div>
                  )}
                </div>
              )}
            </div>

            {entries.length > 0 && (
              <div className="text-center pt-4 border-t border-stone-200">
                {!confirmClear ? (
                  <button onClick={() => setConfirmClear(true)} className="text-xs text-stone-400 hover:text-stone-700 tracking-wide">
                    clear all entries
                  </button>
                ) : (
                  <div className="flex items-center justify-center gap-3 text-xs">
                    <span className="text-stone-600">clear everything?</span>
                    <button onClick={clearAll} className="text-red-700 hover:text-red-900 font-medium">yes, clear</button>
                    <button onClick={() => setConfirmClear(false)} className="text-stone-500 hover:text-stone-900">cancel</button>
                  </div>
                )}
              </div>
            )}

            <div className="text-center mt-8 text-xs text-stone-300 italic" style={{ fontFamily: serif }}>
              do one small thing. then another.
            </div>

          </div>
        </div>
      );
    }

    // ============================================================
    function Root() {
      const [session, setSession] = useState(null);
      const [checkingAuth, setCheckingAuth] = useState(true);
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('five_theme') === 'dark');

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#1c1917');
        } else {
          document.documentElement.classList.remove('dark');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#fafaf9');
        }
        localStorage.setItem('five_theme', darkMode ? 'dark' : 'light');
      }, [darkMode]);

      const toggleTheme = () => setDarkMode(prev => !prev);

      useEffect(() => {
        if (!configured) { setCheckingAuth(false); return; }
        supa.auth.getSession().then(({ data }) => { setSession(data.session); setCheckingAuth(false); });
        const { data: listener } = supa.auth.onAuthStateChange((_event, newSession) => { setSession(newSession); });
        return () => listener.subscription.unsubscribe();
      }, []);

      if (!configured) return <SetupNeeded />;
      if (checkingAuth) return (<div className="min-h-screen bg-stone-50 flex items-center justify-center"><div className="text-stone-400 text-sm italic" style={{ fontFamily: "ui-serif, Georgia, serif" }}>…</div></div>);
      if (!session) return <AuthGate />;
      return <FiveMinuteLog session={session} onSignOut={async () => {
        await supa.auth.signOut();
        localStorage.removeItem(CACHE_KEY);
        localStorage.removeItem(QUEUE_KEY);
      }} darkMode={darkMode} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
