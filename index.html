<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Five. — a logbook</title>

  <!-- iOS "Add to Home Screen" niceties -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Five" />
  <meta name="theme-color" content="#fafaf9" />
  <meta name="description" content="A quiet logbook for five-minute work blocks." />

  <!-- Inline favicon: a serif letter F on cream -->
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23fafaf9'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-size='44' fill='%231c1917'>F</text></svg>" />

  <!-- Tailwind (Play CDN — fine for personal use) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel to transform JSX at load time -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { background: #fafaf9; -webkit-font-smoothing: antialiased; }
    body { margin: 0; }
    /* iOS safe-area padding when launched as a home-screen app */
    #root { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // ---------- localStorage shim so the rest of the code is unchanged ----------
    window.storage = {
      get: async (key) => {
        const val = localStorage.getItem(key);
        return val !== null ? { key, value: val } : null;
      },
      set: async (key, value) => {
        localStorage.setItem(key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem(key);
        return { key, deleted: true };
      }
    };

    const { useState, useEffect, useRef, useMemo } = React;

    const DURATION = 5 * 60;
    const normalize = (s) => (s || "").trim().toLowerCase();

    function FiveMinuteLog() {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [timeLeft, setTimeLeft] = useState(DURATION);
      const [running, setRunning] = useState(false);
      const [justLogged, setJustLogged] = useState(false);
      const [flash, setFlash] = useState(null);
      const [newTag, setNewTag] = useState("");
      const [showTimer, setShowTimer] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState("");
      const [confirmClear, setConfirmClear] = useState(false);
      const intervalRef = useRef(null);
      const entriesRef = useRef(entries);
      const wakeLockRef = useRef(null);
      const flashTimeoutRef = useRef(null);

      useEffect(() => { entriesRef.current = entries; }, [entries]);

      useEffect(() => {
        (async () => {
          try {
            const res = await window.storage.get("entries");
            if (res && res.value) {
              const parsed = JSON.parse(res.value);
              if (Array.isArray(parsed)) setEntries(parsed);
            }
          } catch (e) {}
          setLoading(false);
        })();
      }, []);

      const persist = async (newEntries) => {
        try { await window.storage.set("entries", JSON.stringify(newEntries)); }
        catch (e) { console.error("save failed", e); }
      };

      const acquireWakeLock = async () => {
        try {
          if ("wakeLock" in navigator) {
            wakeLockRef.current = await navigator.wakeLock.request("screen");
          }
        } catch (e) {}
      };
      const releaseWakeLock = async () => {
        try {
          if (wakeLockRef.current) {
            await wakeLockRef.current.release();
            wakeLockRef.current = null;
          }
        } catch (e) {}
      };

      useEffect(() => {
        const handler = () => {
          if (document.visibilityState === "visible" && running) acquireWakeLock();
        };
        document.addEventListener("visibilitychange", handler);
        return () => document.removeEventListener("visibilitychange", handler);
      }, [running]);

      const logFive = async (tag = "") => {
        const normalized = normalize(tag);
        const entry = { id: Date.now(), timestamp: Date.now(), note: normalized };
        const newEntries = [entry, ...entries];
        setEntries(newEntries);
        await persist(newEntries);
        setFlash({ num: newEntries.length, label: normalized });
        if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
        flashTimeoutRef.current = setTimeout(() => setFlash(null), 1400);
        try { if (navigator.vibrate) navigator.vibrate(30); } catch (e) {}
      };

      const logFromInput = async () => {
        if (!newTag.trim()) return;
        await logFive(newTag);
        setNewTag("");
      };

      const autoLog = async () => {
        const entry = { id: Date.now(), timestamp: Date.now(), note: "" };
        const newEntries = [entry, ...entriesRef.current];
        setEntries(newEntries);
        await persist(newEntries);
        setJustLogged(true);
        releaseWakeLock();
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) {
            const ctx = new AC();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = "sine"; o.frequency.value = 660;
            g.gain.setValueAtTime(0.0001, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
            o.start(); o.stop(ctx.currentTime + 0.65);
          }
        } catch (e) {}
        try { if (navigator.vibrate) navigator.vibrate([120, 80, 120]); } catch (e) {}
      };

      useEffect(() => {
        if (running && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) {
                setRunning(false);
                autoLog();
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
          return () => clearInterval(intervalRef.current);
        }
      }, [running]);

      const startTimer = () => {
        setJustLogged(false);
        setTimeLeft(DURATION);
        setRunning(true);
        acquireWakeLock();
      };
      const pauseTimer = () => { setRunning(false); releaseWakeLock(); };
      const resetTimer = () => { setRunning(false); setTimeLeft(DURATION); setJustLogged(false); releaseWakeLock(); };

      const beginEdit = (entry) => { setEditingId(entry.id); setEditDraft(entry.note || ""); };
      const commitEdit = async () => {
        if (editingId == null) return;
        const newEntries = entries.map((e) =>
          e.id === editingId ? { ...e, note: normalize(editDraft) } : e
        );
        setEntries(newEntries);
        await persist(newEntries);
        setEditingId(null);
        setEditDraft("");
      };
      const cancelEdit = () => { setEditingId(null); setEditDraft(""); };

      const deleteEntry = async (id) => {
        const newEntries = entries.filter((e) => e.id !== id);
        setEntries(newEntries);
        await persist(newEntries);
        if (editingId === id) cancelEdit();
      };

      const clearAll = async () => {
        setEntries([]);
        try { await window.storage.delete("entries"); } catch (e) {}
        setConfirmClear(false);
      };

      const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
      const weekStart = new Date(); weekStart.setHours(0, 0, 0, 0); weekStart.setDate(weekStart.getDate() - 6);

      const groupByTag = (items) => {
        const groups = new Map();
        for (const e of items) {
          const key = e.note || "__untitled";
          if (!groups.has(key)) groups.set(key, { key, label: e.note || null, count: 0 });
          groups.get(key).count++;
        }
        return [...groups.values()].sort((a, b) => b.count - a.count);
      };

      const todayEntries = entries.filter((e) => e.timestamp >= todayStart.getTime());
      const weekEntries = entries.filter((e) => e.timestamp >= weekStart.getTime());
      const todayGroups = useMemo(() => groupByTag(todayEntries), [entries]);
      const weekGroups = useMemo(() => groupByTag(weekEntries), [entries]);

      const topTags = useMemo(() => {
        const counts = new Map();
        for (const e of entries) {
          if (!e.note) continue;
          counts.set(e.note, (counts.get(e.note) || 0) + 1);
        }
        return [...counts.entries()]
          .sort((a, b) => b[1] - a[1])
          .slice(0, 8)
          .map(([tag, count]) => ({ tag, count }));
      }, [entries]);

      const todayCount = todayEntries.length;
      const totalCount = entries.length;
      const totalMinutes = totalCount * 5;
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;

      const last7 = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        d.setHours(0, 0, 0, 0);
        const next = d.getTime() + 24 * 60 * 60 * 1000;
        const count = entries.filter((e) => e.timestamp >= d.getTime() && e.timestamp < next).length;
        last7.push({ date: new Date(d), count });
      }
      const maxCount = Math.max(1, ...last7.map((d) => d.count));

      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      const progress = ((DURATION - timeLeft) / DURATION) * 100;

      const formatTimeAgo = (ts) => {
        const diff = Date.now() - ts;
        const mm = Math.floor(diff / 60000);
        if (mm < 1) return "just now";
        if (mm < 60) return `${mm}m ago`;
        const hh = Math.floor(mm / 60);
        if (hh < 24) return `${hh}h ago`;
        const dd = Math.floor(hh / 24);
        if (dd < 7) return `${dd}d ago`;
        const date = new Date(ts);
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      };

      const entryNumber = (index) => `#${String(totalCount - index).padStart(4, "0")}`;
      const serif = "ui-serif, Georgia, Cambria, 'Times New Roman', serif";

      const Breakdown = ({ title, groups, total }) => {
        const max = Math.max(1, ...groups.map((g) => g.count));
        return (
          <div className="mb-10">
            <div className="flex items-baseline justify-between mb-3 pb-2 border-b border-stone-300">
              <div className="text-xs text-stone-500 uppercase tracking-widest">{title}</div>
              {total > 0 && (
                <div className="text-xs text-stone-400 tabular-nums">
                  {total} · {total * 5}m
                </div>
              )}
            </div>
            {groups.length === 0 ? (
              <div className="text-sm text-stone-400 italic py-4 text-center" style={{ fontFamily: serif }}>
                nothing {title.toLowerCase()}.
              </div>
            ) : (
              <div className="space-y-2">
                {groups.map((g) => {
                  const pct = (g.count / max) * 100;
                  return (
                    <div key={g.key} className="flex items-center gap-3">
                      <div
                        className={`text-sm flex-shrink-0 ${g.label ? "text-stone-900" : "text-stone-400 italic"}`}
                        style={{ width: "92px", fontFamily: g.label ? "inherit" : serif, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}
                      >
                        {g.label || "untitled"}
                      </div>
                      <div className="flex-1 h-2 bg-stone-100 relative overflow-hidden" style={{ borderRadius: "1px" }}>
                        <div className="absolute left-0 top-0 h-full bg-amber-700" style={{ width: `${pct}%` }} />
                      </div>
                      <div className="text-xs text-stone-500 tabular-nums flex-shrink-0 text-right" style={{ fontFamily: serif, width: "60px" }}>
                        {g.count} · {g.count * 5}m
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-stone-50 flex items-center justify-center">
            <div className="text-stone-400 text-sm italic" style={{ fontFamily: serif }}>
              opening the ledger…
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif" }}>
          <style>{`
            input, textarea, select { font-size: 16px !important; }
            button, input, textarea, [role="button"], .tap { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
          `}</style>
          <div className="max-w-md mx-auto px-5 py-6">

            <div className="flex items-baseline justify-between mb-6">
              <h1 className="text-3xl italic tracking-tight" style={{ fontFamily: serif }}>Five.</h1>
              <div className="text-xs text-stone-400 tracking-widest uppercase">a logbook</div>
            </div>

            <div className="mb-3">
              <button
                onClick={() => logFive("")}
                className="w-full bg-stone-900 text-stone-50 py-5 text-base tracking-wide hover:bg-stone-800 active:scale-95 transition-all"
                style={{ borderRadius: "2px" }}
              >
                + Log a five
              </button>
            </div>

            {topTags.length > 0 && (
              <div className="mb-4">
                <div className="text-xs text-stone-500 mb-2 tracking-wide">add five to:</div>
                <div className="flex flex-wrap gap-2">
                  {topTags.map(({ tag, count }) => (
                    <button
                      key={tag}
                      onClick={() => logFive(tag)}
                      className="px-3 py-1.5 text-sm border border-stone-300 bg-white hover:bg-amber-50 hover:border-amber-700 active:scale-95 transition-all"
                      style={{ borderRadius: "999px" }}
                    >
                      {tag} <span className="text-stone-400 text-xs tabular-nums ml-1" style={{ fontFamily: serif }}>· {count}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="mb-5 flex gap-2">
              <input
                type="text"
                value={newTag}
                onChange={(e) => setNewTag(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); logFromInput(); } }}
                placeholder="new activity…"
                className="flex-1 border border-stone-300 bg-white px-3 py-2 text-sm focus:outline-none focus:border-amber-700"
                style={{ borderRadius: "2px" }}
              />
              <button
                onClick={logFromInput}
                disabled={!newTag.trim()}
                className="px-4 py-2 text-sm bg-stone-100 border border-stone-300 text-stone-700 hover:bg-stone-200 disabled:opacity-40 disabled:cursor-not-allowed tracking-wide"
                style={{ borderRadius: "2px" }}
              >
                log
              </button>
            </div>

            <div className="mb-6 text-center">
              <button
                onClick={() => setShowTimer(!showTimer)}
                className="text-xs text-stone-500 hover:text-stone-900 tracking-wide"
              >
                {showTimer ? "▴ hide in-app timer" : "▾ use the in-app timer"}
              </button>
            </div>

            {showTimer && (
              <div
                className={`mb-8 border p-6 text-center transition-colors ${
                  justLogged ? "bg-amber-50 border-amber-200" : "bg-white border-stone-300"
                }`}
                style={{ borderRadius: "2px" }}
              >
                {justLogged ? (
                  <>
                    <div className="text-2xl italic text-amber-900 mb-1" style={{ fontFamily: serif }}>five. logged.</div>
                    <div className="text-xs text-stone-500 mb-5">#{String(totalCount).padStart(4, "0")}</div>
                    <button onClick={startTimer} className="w-full bg-stone-900 text-stone-50 py-3 text-sm tracking-wide hover:bg-stone-800 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                      Begin another five →
                    </button>
                    <button onClick={() => setJustLogged(false)} className="mt-3 text-xs text-stone-500 hover:text-stone-900">
                      done for now
                    </button>
                  </>
                ) : (
                  <>
                    <div className="tabular-nums tracking-tight text-stone-900 mb-4" style={{ fontFamily: serif, fontSize: "56px", lineHeight: 1 }}>
                      {m}:{String(s).padStart(2, "0")}
                    </div>
                    <div className="h-px bg-stone-200 mb-5 relative overflow-hidden">
                      <div className="absolute left-0 top-0 h-full bg-amber-700 transition-all duration-1000 ease-linear" style={{ width: `${progress}%` }} />
                    </div>
                    {!running ? (
                      <>
                        <button onClick={startTimer} className="w-full bg-stone-900 text-stone-50 py-3 text-sm tracking-wide hover:bg-stone-800 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                          {timeLeft === DURATION ? "Begin five" : "Resume"}
                        </button>
                        {timeLeft !== DURATION && (
                          <button onClick={resetTimer} className="mt-2 text-xs text-stone-500 hover:text-stone-900">reset</button>
                        )}
                      </>
                    ) : (
                      <button onClick={pauseTimer} className="w-full border border-stone-300 text-stone-900 py-3 text-sm tracking-wide hover:bg-stone-100 active:scale-95 transition-all" style={{ borderRadius: "2px" }}>
                        Pause
                      </button>
                    )}
                    <div className="mt-3 text-xs text-stone-400 italic" style={{ fontFamily: serif }}>
                      keeps the screen on while it runs
                    </div>
                  </>
                )}
              </div>
            )}

            <Breakdown title="Today" groups={todayGroups} total={todayCount} />

            <div className="grid grid-cols-3 mb-8">
              <div className="pr-3">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>{todayCount}</div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">today</div>
              </div>
              <div className="px-3 border-l border-stone-200">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>{totalCount}</div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">total</div>
              </div>
              <div className="pl-3 border-l border-stone-200">
                <div className="text-3xl tabular-nums" style={{ fontFamily: serif }}>
                  {hours}<span className="text-base text-stone-400">h</span> {mins}<span className="text-base text-stone-400">m</span>
                </div>
                <div className="text-xs text-stone-500 mt-1 tracking-wide">logged</div>
              </div>
            </div>

            <div className="mb-10">
              <div className="flex items-end justify-between gap-2" style={{ height: "64px" }}>
                {last7.map((d, i) => {
                  const h = d.count > 0 ? Math.max(3, (d.count / maxCount) * 48) : 2;
                  const isToday = i === 6;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1.5" style={{ height: "64px" }}>
                      <div className="text-xs text-stone-500 tabular-nums" style={{ fontFamily: serif, minHeight: "14px" }}>
                        {d.count > 0 ? d.count : ""}
                      </div>
                      <div className={`w-full rounded-sm ${isToday ? "bg-amber-700" : "bg-stone-300"}`} style={{ height: `${h}px` }} />
                    </div>
                  );
                })}
              </div>
              <div className="flex justify-between gap-2 mt-2">
                {last7.map((d, i) => {
                  const isToday = i === 6;
                  return (
                    <div key={i} className={`flex-1 text-center text-xs tracking-wide ${isToday ? "text-amber-700 font-medium" : "text-stone-400"}`}>
                      {["S", "M", "T", "W", "T", "F", "S"][d.date.getDay()]}
                    </div>
                  );
                })}
              </div>
            </div>

            <Breakdown title="This week" groups={weekGroups} total={weekEntries.length} />

            <div className="mb-8">
              <div className="flex items-baseline justify-between mb-3 pb-2 border-b border-stone-300">
                <div className="text-xs text-stone-500 uppercase tracking-widest">the ledger</div>
                {entries.length > 0 && (
                  <div className="text-xs text-stone-400 tabular-nums">
                    {entries.length} {entries.length === 1 ? "entry" : "entries"}
                  </div>
                )}
              </div>

              {entries.length === 0 ? (
                <div className="text-sm text-stone-400 italic py-10 text-center" style={{ fontFamily: serif }}>
                  nothing yet. begin your first five.
                </div>
              ) : (
                <div>
                  {entries.slice(0, 50).map((entry, i) => {
                    const isEditing = editingId === entry.id;
                    return (
                      <div
                        key={entry.id}
                        className={`flex items-start gap-3 py-3 border-b border-stone-200 ${!isEditing ? "cursor-pointer hover:bg-stone-100" : ""} transition-colors`}
                        onClick={() => !isEditing && beginEdit(entry)}
                      >
                        <div className="text-xs text-stone-400 tabular-nums pt-1 flex-shrink-0" style={{ fontFamily: serif, width: "44px" }}>
                          {entryNumber(i)}
                        </div>
                        <div className="flex-1 min-w-0">
                          {isEditing ? (
                            <input
                              type="text"
                              value={editDraft}
                              onChange={(e) => setEditDraft(e.target.value)}
                              onBlur={commitEdit}
                              onKeyDown={(e) => {
                                if (e.key === "Enter") { e.preventDefault(); commitEdit(); }
                                if (e.key === "Escape") cancelEdit();
                              }}
                              placeholder="activity (e.g. reading)"
                              autoFocus
                              className="w-full bg-transparent border-b border-amber-700 text-sm text-stone-900 focus:outline-none pb-0.5"
                            />
                          ) : (
                            <div className="text-sm text-stone-900 break-words leading-snug">
                              {entry.note || (
                                <span className="text-stone-400 italic" style={{ fontFamily: serif }}>
                                  — untitled · tap to tag
                                </span>
                              )}
                            </div>
                          )}
                          <div className="text-xs text-stone-400 mt-1 tabular-nums">
                            {formatTimeAgo(entry.timestamp)}
                          </div>
                        </div>
                        <button
                          onClick={(e) => { e.stopPropagation(); deleteEntry(entry.id); }}
                          className="text-stone-300 hover:text-stone-700 text-lg leading-none pt-1 flex-shrink-0"
                          aria-label="delete entry"
                        >
                          ×
                        </button>
                      </div>
                    );
                  })}
                  {entries.length > 50 && (
                    <div className="text-xs text-stone-400 text-center py-4 italic" style={{ fontFamily: serif }}>
                      + {entries.length - 50} earlier entries
                    </div>
                  )}
                </div>
              )}
            </div>

            {entries.length > 0 && (
              <div className="text-center pt-4 border-t border-stone-200">
                {!confirmClear ? (
                  <button onClick={() => setConfirmClear(true)} className="text-xs text-stone-400 hover:text-stone-700 tracking-wide">
                    clear all entries
                  </button>
                ) : (
                  <div className="flex items-center justify-center gap-3 text-xs">
                    <span className="text-stone-600">clear everything?</span>
                    <button onClick={clearAll} className="text-red-700 hover:text-red-900 font-medium">yes, clear</button>
                    <button onClick={() => setConfirmClear(false)} className="text-stone-500 hover:text-stone-900">cancel</button>
                  </div>
                )}
              </div>
            )}

            <div className="text-center mt-8 text-xs text-stone-300 italic" style={{ fontFamily: serif }}>
              do one small thing. then another.
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FiveMinuteLog />);
  </script>
</body>
</html>
