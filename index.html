<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Five. — a logbook</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Five" />
  <meta name="theme-color" content="#fafaf9" />

  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23fafaf9'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-size='44' fill='%231c1917'>F</text></svg>" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    html, body { background: #fafaf9; -webkit-font-smoothing: antialiased; }
    html.dark, html.dark body { background: #1c1917; }
    body { margin: 0; }
    #root { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    /* Soft dark theme — warm stone palette, inverted */
    html.dark .bg-stone-50  { background-color: #1c1917; }
    html.dark .bg-white     { background-color: #292524; }
    html.dark .bg-stone-100 { background-color: #3c3837; }
    html.dark .bg-stone-200 { background-color: #44403c; }
    html.dark .bg-stone-900 { background-color: #fafaf9; }
    html.dark .bg-amber-50  { background-color: #2d1f0f; }

    html.dark .text-stone-900 { color: #fafaf9; }
    html.dark .text-stone-800 { color: #e7e5e4; }
    html.dark .text-stone-700 { color: #d6d3d1; }
    html.dark .text-stone-600 { color: #a8a29e; }
    html.dark .text-stone-500 { color: #a8a29e; }
    html.dark .text-stone-400 { color: #78716c; }
    html.dark .text-stone-300 { color: #78716c; }
    html.dark .text-stone-50  { color: #1c1917; }
    html.dark .text-amber-700 { color: #d97706; }
    html.dark .text-amber-900 { color: #fbbf24; }
    html.dark .text-red-700   { color: #f87171; }

    html.dark .border-stone-200 { border-color: #3c3837; }
    html.dark .border-stone-300 { border-color: #44403c; }
    html.dark .border-stone-900 { border-color: #fafaf9; }
    html.dark .border-amber-200 { border-color: #78350f; }

    html.dark .hover\:bg-stone-100:hover    { background-color: #292524; }
    html.dark .hover\:bg-stone-200:hover    { background-color: #3c3837; }
    html.dark .hover\:bg-stone-800:hover    { background-color: #e7e5e4; }
    html.dark .hover\:bg-amber-50:hover     { background-color: #2d1f0f; }
    html.dark .hover\:border-amber-700:hover { border-color: #d97706; }
    html.dark .hover\:text-stone-700:hover  { color: #d6d3d1; }
    html.dark .hover\:text-stone-900:hover  { color: #fafaf9; }
    html.dark .focus\:border-amber-700:focus { border-color: #d97706; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>if (localStorage.getItem('five_theme') === 'dark') document.documentElement.classList.add('dark');</script>

  <script type="text/babel" data-presets="react" src="src/lib/constants.js"></script>
  <script type="text/babel" data-presets="react" src="src/lib/config.js"></script>
  <script type="text/babel" data-presets="react" src="src/lib/tags.js"></script>
  <script type="text/babel" data-presets="react" src="src/lib/storage.js"></script>
  <script type="text/babel" data-presets="react" src="src/lib/format.js"></script>

  <script type="text/babel" data-presets="react" src="src/components/SetupNeeded.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/AuthGate.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Principles.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/FiveMinuteLog.jsx"></script>

  <script type="text/babel" data-presets="react" src="src/Root.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/main.jsx"></script>
</body>
</html>
